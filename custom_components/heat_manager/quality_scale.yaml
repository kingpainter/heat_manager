rules:
  # ── Bronze ────────────────────────────────────────────────────────────────
  action-setup: done
  appropriate-polling: done
  brands: todo
  common-modules: done
  config-flow: done
  config-flow-test-coverage: todo
  dependency-transparency: done
  docs-actions: done
  docs-high-level-description: done
  docs-installation-instructions: done
  docs-removal-instructions: done
  entity-event-setup: todo
  entity-unique-id: todo
  has-entity-name: todo
  runtime-data: todo
  test-before-configure: done
  test-before-setup: todo
  unique-config-entry: todo

  # ── Silver ────────────────────────────────────────────────────────────────
  action-exceptions: done
  config-entry-unloading: done
  docs-configuration-parameters: done
  docs-installation-parameters: done
  entity-unavailable: todo
  integration-owner: done
  log-when-unavailable: todo
  parallel-updates: todo
  reauthentication-flow:
    status: exempt
    comment: >
      Heat Manager does not connect to any external device or service.
      It only interacts with existing Home Assistant entities (climate,
      person, binary_sensor, weather). No authentication is required.
  test-coverage: todo

  # ── Gold ──────────────────────────────────────────────────────────────────
  devices: todo
  diagnostics: todo
  discovery:
    status: exempt
    comment: >
      Heat Manager is a logic integration that wraps existing HA entities.
      There are no physical devices to discover on the network.
  discovery-update-info:
    status: exempt
    comment: Same reason as discovery — no network devices.
  docs-data-update: todo
  docs-examples: done
  docs-known-limitations: done
  docs-supported-devices:
    status: exempt
    comment: >
      Heat Manager works with any climate entity. There are no specific
      supported or unsupported device models to document.
  docs-supported-functions: done
  docs-troubleshooting: done
  docs-use-cases: done
  dynamic-devices: todo
  entity-category: todo
  entity-device-class: todo
  entity-disabled-by-default: todo
  entity-translations: done
  exception-translations: todo
  icon-translations: todo
  reconfiguration-flow: done
  repair-issues: todo
  stale-devices: todo

  # ── Platinum ──────────────────────────────────────────────────────────────
  async-dependency:
    status: exempt
    comment: No external library dependency. All HA built-ins are async.
  inject-websession:
    status: exempt
    comment: No external HTTP calls. No websession needed.
  strict-typing: todo
