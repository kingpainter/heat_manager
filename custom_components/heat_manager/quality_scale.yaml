rules:
  # ── Bronze ────────────────────────────────────────────────────────────────
  action-setup: done
  appropriate-polling: done
  brands: todo
  common-modules: done
  config-flow: done
  config-flow-test-coverage: todo
  dependency-transparency: done
  docs-actions: done
  docs-high-level-description: done
  docs-installation-instructions: done
  docs-removal-instructions: done
  entity-event-setup: done
  entity-unique-id: done
  has-entity-name: done
  runtime-data: done
  test-before-configure: done
  test-before-setup: done  # ConfigEntryNotReady raised when climate entities unreachable
  unique-config-entry: done

  # ── Silver ────────────────────────────────────────────────────────────────
  action-exceptions: done
  config-entry-unloading: done
  docs-configuration-parameters: done
  docs-installation-parameters: done
  entity-unavailable: done  # unavailable climate → RoomStateSensor marks unavailable
  integration-owner: done
  log-when-unavailable: done  # single WARNING on unavailable, INFO on recovery in sensor.py
  parallel-updates: done
  reauthentication-flow:
    status: exempt
    comment: >
      Heat Manager does not connect to any external device or service.
      It only interacts with existing Home Assistant entities (climate,
      person, binary_sensor, weather). No authentication is required.
  test-coverage: todo  # 58 tests — coverage not formally measured yet

  # ── Gold ──────────────────────────────────────────────────────────────────
  devices: todo
  diagnostics: done  # diagnostics.py — async_get_config_entry_diagnostics()
  discovery:
    status: exempt
    comment: >
      Heat Manager is a logic integration that wraps existing HA entities.
      There are no physical devices to discover on the network.
  discovery-update-info:
    status: exempt
    comment: Same reason as discovery — no network devices.
  docs-data-update: done
  docs-examples: done
  docs-known-limitations: done
  docs-supported-devices:
    status: exempt
    comment: >
      Heat Manager works with any climate entity. There are no specific
      supported or unsupported device models to document.
  docs-supported-functions: done
  docs-troubleshooting: done
  docs-use-cases: done
  dynamic-devices: todo
  entity-category: done
  entity-device-class: done
  entity-disabled-by-default: done  # diagnostic/config entities off by default in all platforms
  entity-translations: done
  exception-translations: done  # ServiceValidationError and ConfigEntryNotReady with translation_key
  icon-translations: done  # icons.json with entity icon overrides
  reconfiguration-flow: done
  repair-issues: todo
  stale-devices: todo

  # ── Platinum ──────────────────────────────────────────────────────────────
  async-dependency:
    status: exempt
    comment: No external library dependency. All HA built-ins are async.
  inject-websession:
    status: exempt
    comment: No external HTTP calls. No websession needed.
  strict-typing: todo
